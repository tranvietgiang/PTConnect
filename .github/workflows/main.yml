name: PTConnect CI

on:
  push:
    branches:
      - main

jobs:
  frontend:
    name: Frontend React
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./fe-ptconnect

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: fe-ptconnect/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Check lint if available
        run: npm run lint --if-present

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}

  backend:
    name: Backend Laravel
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ vars.DB_DATABASE }}
          MYSQL_USER: ${{ vars.DB_USERNAME }}
          MYSQL_PASSWORD: ${{ secrets.DB_PASSWORD }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -p${{ secrets.DB_ROOT_PASSWORD }}"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: ./be-ptconnect

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, dom, fileinfo, pdo_mysql, bcmath, gd, zip
          tools: composer:v2

      - name: Install backend dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Create Laravel env file
        run: |
          cp .env.example .env
          php artisan key:generate
        env:
          APP_ENV: testing

      - name: Override env for CI
        run: |
          echo "APP_ENV=testing" >> .env
          echo "APP_DEBUG=true" >> .env
          echo "DB_CONNECTION=mysql" >> .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_DATABASE=${{ vars.DB_DATABASE }}" >> .env
          echo "DB_USERNAME=${{ vars.DB_USERNAME }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
          echo "JWT_ACCESS_TTL=${{ vars.JWT_ACCESS_TTL }}" >> .env
          echo "JWT_REFRESH_TTL=${{ vars.JWT_REFRESH_TTL }}" >> .env

      - name: Run database migrations
        run: php artisan migrate --force

      - name: Run backend tests if available
        run: |
          if [ -f "vendor/bin/phpunit" ]; then
            php artisan test
          else
            echo "No PHPUnit found, skip tests."
          fi

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs:
      - frontend
      - backend

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./fe-ptconnect
          file: ./fe-ptconnect/Dockerfile
          push: false
          tags: ptconnect-frontend:ci

      - name: Build backend Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./be-ptconnect
          file: ./be-ptconnect/Dockerfile
          push: false
          tags: ptconnect-backend:ci
