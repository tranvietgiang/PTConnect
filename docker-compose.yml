version: "3"

services:
  mysql:
    image: mysql:8.0
    container_name: ptconnect-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ptconnect_pass
      MYSQL_DATABASE: ptconnect_db
      MYSQL_USER: ptconnect
      MYSQL_PASSWORD: ptconnect_pass
    ports:
      - "3306:3306"
    volumes:
      - ptconnect_mysql_data:/var/lib/mysql

  backend:
    build: ./be-ptconnect
    container_name: ptconnect-backend
    ports:
      - "8000:80"
    volumes:
      - ./be-ptconnect:/var/www/html
    depends_on:
      - mysql

  frontend:
    build: ./fe-ptconnect
    container_name: ptconnect-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./fe-ptconnect:/app
      - /app/node_modules
    working_dir: /app
    command: ["npm", "run", "dev", "--", "--host"]
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: ptconnect-phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ptconnect_pass
      UPLOAD_LIMIT: 128M
    depends_on:
      - mysql

volumes:
  ptconnect_mysql_data:
